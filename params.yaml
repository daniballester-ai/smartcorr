database:
  server: SPWS-VM-DB81
  database: OdsCorp
  driver: SQL Server
  auth_type: windows
  user: null
  password: null
data:
  mode: inference
  queries_file: config/queries.ini
  raw_path: data/raw/raw_history.csv
  clean_path: data/interim/clean_data.csv
  processed_train_path: data/processed/train_data.csv
  processed_test_path: data/processed/test_data.csv
  processed_future_path: data/processed/future_data.csv
  test_size: 0.2
  janela_dias: 90
  janela_dias_inference: 30
  future_days: 7
  data_corte_final: null
  target: NS_Real
  programas:
  - 366845
  - 370587
  - 370588
  - 548619
  - 581345
  - 581346
  - 589266
  - 589360
  - 589361
  - 591529
  - 347851
  - 347858
  - 353059
  - 355491
  - 355492
  canal: 7
  filtro_operacional:
    ativo: true
    vol_minimo_operacional: 1
  target_encoding_path: models/target_encoding.json
  target_encoding_dir: models/encodings/
  use_feature_registry: true
  features:
  - Vol_Previsto
  - HC_Previsto
  - Tempo_AHT_Previsto_Total
  - Hora
  - DiaSemana
  - ABS_Taxa_Daily
  - Turnover_Taxa_Daily
  - Ferias_Qtd_Daily
  - Faltas_Qtd_Daily
  - TME_Real_Avg_Lag_1
  - Desvio_Volume_Pct_Lag_1
  - Delta_TMA_Lag_1
  - Pressao_Prevista_Vol_HC
  - Indicador_Sufoco
  - Vol_Por_Agente
  - Margem_Capacidade
  - Ocupacao_Sintetica
  - PerdaLog_Taxa_Daily
  - NewHire_Pct_Daily
  - AgentIssues_Taxa_Daily
  - NS_Media_Movel_3
  - NS_Media_Movel_6
  - NS_Std_Movel_6
  - NS_Lag_1
  - NS_Lag_2
  - NS_Lag_3
  - Delta_Aceleracao_NS
  - Programa_Target_Enc
  - Dia_Mes
  - Semana_Mes
  - Dia_Semana
  - Is_Inicio_Fim_Mes
  - Is_Segunda_Sexta
  - Is_Fim_Semana
  - Hora_Dia_Ciclo
  - Is_Horario_Pico
  - NS_Previsto_Erlang
model:
  path: models/model.pkl
  models_dir: models/
  metrics_dir: metrics/
  metrics_path: metrics/train_metrics.json
  min_registros_operacionais: 50
  type: XGBRegressor
  limite_correcao_residuo: 0.15
  training:
    sample_threshold: 500000
    sample_frac: 0.2
  params:
    n_estimators: 200
    max_depth: 4
    learning_rate: 0.05
    min_child_weight: 10
    alpha: 15
    reg_lambda: 20
    colsample_bytree: 0.7
    subsample: 0.75
    random_state: 42
    n_jobs: -1
    tree_method: hist
    objective: reg:absoluteerror
    early_stopping_rounds: 30
  target_transformation: true
  optimize_hyperparameters: true
  optuna_n_trials: 20
  use_cv: true
  cv_n_splits: 5
  use_rolling_window: true
  rolling_window_days: 90
  enable_drift_detection: true
  drift_threshold: 0.15
  use_ensemble: false
  ensemble_models:
  - XGBRegressor
  - RandomForest
  - Ridge
  ensemble_weights:
  - 0.5
  - 0.3
  - 0.2
inference:
  output_path: data/processed/predictions.csv
